site:
  title: "SecPath Radar"
  tagline: "رادار روزانه امنیت سایبری، CVEها و تهدیدهای مهم"
  domain: "radar.secpath.space"

fetch:
  max_items_per_source: 12
  max_total_items: 40
  sleep_ms_between_sources: 900
  user_agent: "SecPathRadar/0.3 (+https://radar.secpath.space)"

cve:
  max_cves: 12
  lookback_days: 2
  sleep_ms_between_sources: 1300
  nvd_url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
  kev_url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
  epss_url: "https://api.first.org/data/v1/epss"
  include_epss: true

cache:
  enabled: true
  dir: "data/cache/http"
  ttl_minutes: 720

gemini:
  model: "gemini-2.5-flash"
  api_url: "https://generativelanguage.googleapis.com/v1beta"
  cache_dir: "data/cache/ai"
  temperature: 0.2
  max_iran_items: 5
  max_global_news: 7
  max_cves: 8

filters:
  iran_keywords:
    - iran
    - iranian
    - tehran
    - .ir
    - irancell
    - hamrah aval
    - shaparak
    - shetab
    - apt34
    - oilrig
    - charming kitten
    - muddywater
    - ایران
    - ایرانی
    - تهران
    - ایرانسل
    - همراه اول
    - شاپرک
    - شتاب
    - بانک ملی
    - بانک ملت
  high_keywords:
    - zero-day
    - zeroday
    - actively exploited
    - exploited in the wild
    - ransomware
    - data breach
    - breach
    - critical
    - vulnerability
    - cve-
    - exploit
    - malware
    - apt
    - fortinet
    - cisco
    - microsoft
    - exchange
    - vpn
    - firewall
    - linux
    - openssh
    - wordpress
    - kubernetes
    - docker
  low_keywords:
    - sponsored
    - webinar
    - podcast
    - opinion

limits:
  iran_radar: 5
  global_news: 7
  cves: 8

sources:
  - name: "CISA Advisories"
    url: "https://www.cisa.gov/cybersecurity-advisories/all.xml"
  - name: "BleepingComputer"
    url: "https://www.bleepingcomputer.com/feed/"
  - name: "The Hacker News"
    url: "https://thehackernews.com/feeds/posts/default"
  - name: "KrebsOnSecurity"
    url: "https://krebsonsecurity.com/feed/"
