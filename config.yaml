site:
  title: "SecPath Radar"
  tagline: "رادار روزانه امنیت سایبری، CVEها و تهدیدهای مهم"
  domain: "radar.secpath.space"

fetch:
  max_items_per_source: 8
  max_total_items: 90
  sleep_ms_between_sources: 450
  user_agent: "SecPathRadar/0.4.8 (+https://radar.secpath.space)"

cve:
  max_cves: 14
  lookback_days: 2
  sleep_ms_between_sources: 1300
  nvd_url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
  kev_url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
  epss_url: "https://api.first.org/data/v1/epss"
  include_epss: true

cache:
  enabled: true
  dir: "data/cache/http"
  ttl_minutes: 720

gemini:
  model: "gemini-2.5-flash"
  api_url: "https://generativelanguage.googleapis.com/v1beta"
  cache_dir: "data/cache/ai"
  temperature: 0.15
  max_iran_items: 5
  max_global_news: 8
  max_cves: 7

filters:
  iran_keywords:
    - iran
    - iranian
    - tehran
    - .ir
    - irancell
    - hamrah aval
    - shaparak
    - shetab
    - apt34
    - oilrig
    - charming kitten
    - muddywater
    - ایران
    - ایرانی
    - تهران
    - ایرانسل
    - همراه اول
    - شاپرک
    - شتاب
    - بانک ملی
    - بانک ملت
  high_keywords:
    - zero-day
    - zeroday
    - actively exploited
    - exploited in the wild
    - ransomware
    - data breach
    - breach
    - critical
    - vulnerability
    - cve-
    - exploit
    - malware
    - apt
    - botnet
    - phishing
    - stealer
    - fortinet
    - cisco
    - microsoft
    - exchange
    - vpn
    - firewall
    - linux
    - openssh
    - wordpress
    - kubernetes
    - docker
    - cloudflare
    - ivanti
    - palo alto
    - citrix
    - sonicwall
    - vmware
  low_keywords:
    - sponsored
    - webinar
    - podcast
    - opinion
    - job
    - conference

limits:
  iran_radar: 5
  global_news: 18
  cves: 10

sources:
  - name: "CISA Advisories"
    url: "https://www.cisa.gov/cybersecurity-advisories/all.xml"
  - name: "BleepingComputer"
    url: "https://www.bleepingcomputer.com/feed/"
  - name: "SecurityWeek"
    url: "https://www.securityweek.com/feed/"
  - name: "KrebsOnSecurity"
    url: "https://krebsonsecurity.com/feed/"
  - name: "The Hacker News"
    url: "https://feeds.feedburner.com/TheHackersNews"
  - name: "Dark Reading"
    url: "https://www.darkreading.com/rss/all.xml"
  - name: "SANS ISC"
    url: "https://isc.sans.edu/rssfeed_full.xml"
  - name: "Cisco Security Advisories"
    url: "https://sec.cloudapps.cisco.com/security/center/psirtrss20/CiscoSecurityAdvisory.xml"
  - name: "Cisco Talos"
    url: "https://blog.talosintelligence.com/rss/"
  - name: "Microsoft Security Blog"
    url: "https://www.microsoft.com/en-us/security/blog/feed/"
  - name: "Google Online Security Blog"
    url: "https://security.googleblog.com/feeds/posts/default"
  - name: "Google Project Zero"
    url: "https://googleprojectzero.blogspot.com/feeds/posts/default"
  - name: "Cloudflare Security"
    url: "https://blog.cloudflare.com/tag/security/rss/"
  - name: "Unit 42"
    url: "https://unit42.paloaltonetworks.com/feed/"
  - name: "Rapid7 Blog"
    url: "https://www.rapid7.com/blog/rss/"
  - name: "CERT/CC Vulnerability Notes"
    url: "https://kb.cert.org/vuls/atomfeed"
  - name: "Infosecurity Magazine"
    url: "https://www.infosecurity-magazine.com/rss/news/"
  - name: "PortSwigger Research"
    url: "https://portswigger.net/research/rss"
