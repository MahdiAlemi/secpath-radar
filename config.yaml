site:
  title: "SecPath Radar"
  tagline: "Daily cybersecurity intelligence dashboard"
  github: "https://github.com/MahdiAlemi/secpath-radar"
  domain: "radar.secpath.space"


fetch:
  max_items_per_source: 20
  max_total_items: 500
  sleep_ms_between_sources: 200
  user_agent: "SecPathRadar/1.1.0 (+https://radar.secpath.space)"
  max_concurrent_sources: 8
  news_fallback_hours: 36
  min_news_items_for_publish: 5
  max_source_failure_percent: 50
  connect_timeout_seconds: 8
  request_timeout_seconds: 20
  proxy: ""

cve:
  max_cves: 14
  lookback_days: 2
  sleep_ms_between_sources: 1300
  nvd_url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
  kev_url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
  epss_url: "https://api.first.org/data/v1/epss"
  include_epss: true
  include_epss_momentum: true
  epss_momentum_days:
    - 7
    - 30
  include_vulnrichment: true
  vulnrichment_base_url: "https://raw.githubusercontent.com/cisagov/vulnrichment/develop"
  max_vulnrichment: 10
  include_fallback: true
  fallback_delta_url: "https://raw.githubusercontent.com/CVEProject/cvelistV5/main/cves/delta.json"
  max_fallback_records: 20

intel:
  enabled: true
  cache_dir: "data/cache/intel"
  refresh_hours: 1
  sleep_ms_between_sources: 350
  attack_pressure:
    enabled: true
    max_ports: 10
    top_ports_url: "https://feeds.dshield.org/feeds//topports.txt"
    top_ports_source_url: "https://feeds.dshield.org/feeds//topports_source.txt"
    top_ports_reports_url: "https://feeds.dshield.org/feeds//topports_reports.txt"
    top_ports_targets_url: "https://feeds.dshield.org/feeds//topports_targets.txt"
  ioc_radar:
    enabled: true
    max_urlhaus: 18
    max_threatfox: 18
    urlhaus_recent_csv_url: "https://urlhaus.abuse.ch/downloads/csv_recent/"
    threatfox_recent_csv_url: "https://threatfox.abuse.ch/export/csv/recent/"
  infrastructure:
    enabled: true
    max_ips: 12
    shodan_base_url: "https://internetdb.shodan.io"
    dshield_top_ips_url: "https://feeds.dshield.org/feeds/topips.txt"
  supply_chain:
    enabled: true
    max_advisories: 24
    github_advisories_url: "https://api.github.com/advisories"
    osv_base_url: "https://osv.dev/vulnerability"
    ecosystems:
      - npm
      - pip
      - maven
      - go
      - rust
      - composer
      - nuget
  ransomware:
    enabled: true
    max_victims: 30
    recent_victims_url: "https://api.ransomware.live/v2/recentvictims"
  botnet_c2:
    enabled: true
    max_c2: 18
    max_tls: 16
    feodo_ipblocklist_csv_url: "https://feodotracker.abuse.ch/downloads/ipblocklist.csv"
    sslbl_ja3_csv_url: "https://sslbl.abuse.ch/blacklist/ja3_fingerprints.csv"
    sslbl_cert_csv_url: "https://sslbl.abuse.ch/blacklist/sslblacklist.csv"
  greynoise:
    enabled: true
    max_lookups: 8
    community_api_url: "https://api.greynoise.io/v3/community"
    api_key_env: "GREYNOISE_API_KEY"
  phishing:
    enabled: true
    max_urls: 24
    openphish_feed_url: "https://openphish.com/feed.txt"
  ics_ot:
    enabled: true
    max_advisories: 12
    ics_advisories_feed_url: "https://www.cisa.gov/cybersecurity-advisories/ics-advisories.xml"
  malware_bazaar:
    enabled: true
    max_samples: 14
    recent_csv_url: "https://bazaar.abuse.ch/export/csv/recent/"
  spamhaus_drop:
    enabled: true
    max_ranges: 14
    drop_v4_url: "https://www.spamhaus.org/drop/drop_v4.json"
  csaf:
    enabled: true
    max_advisories: 6
    changes_csv_url: "https://security.access.redhat.com/data/csaf/v2/advisories/changes.csv"
    base_url: "https://security.access.redhat.com/data/csaf/v2/advisories"
  nuclei_coverage:
    enabled: true
    max_templates: 12
    max_missing: 8
    templates_tree_url: "https://api.github.com/repos/projectdiscovery/nuclei-templates/git/trees/main?recursive=1"
  poc_watch:
    enabled: true
    recent_days: 30
    max_repos_per_cve: 1
    max_results: 18
    max_search_results_per_query: 30
    github_search_repositories_url: "https://api.github.com/search/repositories"
    github_token_env: "GITHUB_TOKEN"

cache:
  enabled: true
  dir: "data/cache/http"
  ttl_minutes: 90

gemini:
  model: "gemini-2.5-flash"
  api_url: "https://generativelanguage.googleapis.com/v1beta"
  cache_dir: "data/cache/ai"
  temperature: 0.15
  max_global_news: 10
  max_cves: 10

filters:
  high_keywords:
    - zero-day
    - zeroday
    - actively exploited
    - exploited in the wild
    - ransomware
    - data breach
    - breach
    - critical
    - vulnerability
    - cve-
    - exploit
    - malware
    - apt
    - botnet
    - phishing
    - stealer
    - fortinet
    - cisco
    - microsoft
    - exchange
    - vpn
    - firewall
    - linux
    - openssh
    - wordpress
    - kubernetes
    - docker
    - cloudflare
    - ivanti
    - palo alto
    - citrix
    - sonicwall
    - vmware
  low_keywords:
    - sponsored
    - webinar
    - podcast
    - opinion
    - job
    - conference

limits:
  global_news: 50
  cves: 14


