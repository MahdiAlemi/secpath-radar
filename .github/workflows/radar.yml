name: SecPath Radar CI

on:
  workflow_dispatch:
    inputs:
      ai:
        description: "Run with Gemini AI polish"
        type: boolean
        default: false

# Local/project rule: do not deploy or publish from CI unless explicitly re-enabled.
permissions:
  contents: read

concurrency:
  group: secpath-radar-ci
  cancel-in-progress: false

jobs:
  render-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache radar data (HTTP, intel, AI editorial)
        uses: actions/cache@v4
        with:
          path: data/cache
          key: radar-data-cache-${{ github.run_id }} 
          restore-keys: |
            radar-data-cache-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --all

      - name: Decide run mode
        id: mode
        run: |
          if [ "${{ inputs.ai }}" = "true" ]; then
            echo "flags=--full --ai" >> "$GITHUB_OUTPUT"
          else
            echo "flags=--full" >> "$GITHUB_OUTPUT"
          fi

      - name: Render static radar without publishing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: cargo run --release -- ${{ steps.mode.outputs.flags }}
