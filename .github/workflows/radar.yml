name: SecPath Radar

on:
  schedule:
    # Avoid minute 0, which is a high-load period for scheduled workflows.
    - cron: "17 */2 * * *"
  workflow_dispatch:
    inputs:
      ai:
        description: "Run with Gemini AI polish"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: secpath-radar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build, collect, and validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Restore encrypted private state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RADAR_STATE_KEY: ${{ secrets.RADAR_STATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${RADAR_STATE_KEY:-}" ]; then
            echo "::error::Missing RADAR_STATE_KEY repository secret"
            exit 1
          fi

          validate_state_archive() {
            local archive="$1"
            local manifest
            manifest="$(mktemp)"

            if ! tar -tzf "$archive" > "$manifest"; then
              rm -f "$manifest"
              return 1
            fi

            if ! tar -tvzf "$archive" | awk '
              {
                type = substr($1, 1, 1)
                if (type != "-" && type != "d") {
                  exit 1
                }
              }
            '; then
              echo "::warning::State archive contains a non-file/non-directory entry"
              rm -f "$manifest"
              return 1
            fi

            while IFS= read -r entry; do
              entry="${entry#./}"
              entry="${entry%/}"
              [ -z "$entry" ] && continue

              case "$entry" in
                data/cache|data/cache/*|data/day_state|data/day_state/*|data/latest_brief.json|snapshots|snapshots/*)
                  ;;
                *)
                  echo "::warning::Unexpected path in state archive: $entry"
                  rm -f "$manifest"
                  return 1
                  ;;
              esac

              case "/$entry/" in
                *"/../"*|*"/./"*)
                  echo "::warning::Unsafe path in state archive: $entry"
                  rm -f "$manifest"
                  return 1
                  ;;
              esac
            done < "$manifest"

            rm -f "$manifest"
            return 0
          }

          rm -rf _state-download _legacy-out _state-artifact.zip radar-state.tar.gz
          mkdir -p data/cache data/day_state snapshots
          restored=0

          mapfile -t artifact_ids < <(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/artifacts?name=radar-private-state&per_page=100" \
              --jq '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | reverse | .[].id'
          )

          for artifact_id in "${artifact_ids[@]:0:5}"; do
            rm -rf _state-download _state-artifact.zip radar-state.tar.gz
            mkdir -p _state-download

            if ! curl --fail --location --silent --show-error \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
              --output _state-artifact.zip; then
              echo "::warning::Could not download state artifact ${artifact_id}; trying an older copy"
              continue
            fi

            if ! unzip -q _state-artifact.zip -d _state-download; then
              echo "::warning::Could not unpack state artifact ${artifact_id}; trying an older copy"
              continue
            fi

            if [ ! -s _state-download/radar-state.tar.gz.gpg ]; then
              echo "::warning::State artifact ${artifact_id} has no encrypted payload; trying an older copy"
              continue
            fi

            if ! printf '%s' "$RADAR_STATE_KEY" | gpg \
              --batch \
              --yes \
              --no-tty \
              --pinentry-mode loopback \
              --passphrase-fd 0 \
              --output radar-state.tar.gz \
              --decrypt _state-download/radar-state.tar.gz.gpg; then
              echo "::warning::Could not decrypt state artifact ${artifact_id}; trying an older copy"
              continue
            fi

            if ! validate_state_archive radar-state.tar.gz; then
              echo "::warning::State artifact ${artifact_id} failed validation; trying an older copy"
              continue
            fi

            tar -xzf radar-state.tar.gz
            restored=1
            echo "::notice::Restored encrypted state artifact ${artifact_id}"
            break
          done

          # One-time migration path from the old public radar-output state.
          if [ "$restored" -eq 0 ]; then
            echo "::notice::No usable encrypted state artifact found; checking legacy radar-output state"
            rm -rf _legacy-out

            if git fetch --no-tags origin radar-output --depth=1; then
              git worktree add --detach _legacy-out origin/radar-output
              migrated=0

              if [ -d _legacy-out/state/cache ]; then
                cp -a _legacy-out/state/cache/. data/cache/
                migrated=1
              fi
              if [ -d _legacy-out/state/day_state ]; then
                cp -a _legacy-out/state/day_state/. data/day_state/
                migrated=1
              fi
              if [ -d _legacy-out/state/snapshots ]; then
                cp -a _legacy-out/state/snapshots/. snapshots/
                migrated=1
              fi
              if [ -s _legacy-out/state/latest_brief.json ]; then
                cp -a _legacy-out/state/latest_brief.json data/latest_brief.json
                migrated=1
              fi

              git worktree remove --force _legacy-out

              if [ "$migrated" -eq 1 ]; then
                echo "::notice::Migrated legacy state from radar-output; the validated run will store it encrypted"
              else
                echo "::notice::Legacy radar-output contains no state; starting fresh"
              fi
            else
              echo "::notice::radar-output does not exist; starting without restored state"
            fi
          fi

          rm -rf _state-download _legacy-out _state-artifact.zip radar-state.tar.gz

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: rustfmt

      - name: Cache Cargo build data
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --all --locked

      - name: Decide run mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.ai }}" = "true" ]; then
            echo "flags=--full --ai" >> "$GITHUB_OUTPUT"
          else
            echo "flags=--full" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary without secrets
        run: cargo build --release --locked

      - name: Collect, render, and run quality gates
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GREYNOISE_API_KEY: ${{ secrets.GREYNOISE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          RUST_BACKTRACE: "1"
        run: ./target/release/secpath-radar ${{ steps.mode.outputs.flags }}

      - name: Stage public Pages and publication bundle
        shell: bash
        run: |
          set -euo pipefail
          test -s site/index.html
          test -s site/feed.xml
          test -s site/api/brief.json
          test -s site/api/summary.json
          test -s data/latest_brief.json

          rm -rf _pages _publication radar-publication.tar.gz
          mkdir -p _pages _publication

          # Public GitHub Pages artifact: rendered site only.
          cp -a site/. _pages/
          printf '%s\n' 'radar.secpath.space' > _pages/CNAME
          touch _pages/.nojekyll

          # Public radar-output mirror: rendered site only, never runtime state.
          cp -a _pages/. _publication/

          # Security invariants: internal state must never enter public outputs.
          for root in _pages _publication; do
            test ! -e "$root/state"
            test ! -e "$root/.env"
            test ! -e "$root/data"
            test -s "$root/index.html"
            test -s "$root/feed.xml"
            test -s "$root/api/brief.json"
            test -s "$root/api/summary.json"
          done

          tar -C _publication -czf radar-publication.tar.gz .

      - name: Encrypt validated private state
        shell: bash
        env:
          RADAR_STATE_KEY: ${{ secrets.RADAR_STATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${RADAR_STATE_KEY:-}" ] || [ "${#RADAR_STATE_KEY}" -lt 32 ]; then
            echo "::error::RADAR_STATE_KEY must be present and at least 32 characters"
            exit 1
          fi

          test -d data/cache
          test -d data/day_state
          test -d snapshots
          test -s data/latest_brief.json

          rm -f radar-state.tar.gz radar-state.tar.gz.gpg
          tar -czf radar-state.tar.gz \
            data/cache \
            data/day_state \
            data/latest_brief.json \
            snapshots

          if tar -tzf radar-state.tar.gz | grep -Eq '(^|/)(\.env|\.git)(/|$)|(^|/)\.\.(/|$)|^/'; then
            echo "::error::Private state archive contains a forbidden path"
            exit 1
          fi

          printf '%s' "$RADAR_STATE_KEY" | gpg \
            --batch \
            --yes \
            --no-tty \
            --pinentry-mode loopback \
            --passphrase-fd 0 \
            --symmetric \
            --cipher-algo AES256 \
            --compress-algo none \
            --output radar-state.tar.gz.gpg \
            radar-state.tar.gz

          rm -f radar-state.tar.gz
          test -s radar-state.tar.gz.gpg

      - name: Upload validated publication bundle
        uses: actions/upload-artifact@v7
        with:
          name: radar-publication-${{ github.run_id }}
          path: radar-publication.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Upload encrypted private state
        uses: actions/upload-artifact@v7
        with:
          name: radar-private-state
          path: radar-state.tar.gz.gpg
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _pages

  publish:
    name: Publish validated output
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download validated bundle
        uses: actions/download-artifact@v8
        with:
          name: radar-publication-${{ github.run_id }}

      - name: Publish state-free radar-output branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _pub
          mkdir -p _pub
          tar -xzf radar-publication.tar.gz -C _pub

          test -s _pub/index.html
          test -s _pub/feed.xml
          test -s _pub/api/brief.json
          test -s _pub/api/summary.json
          test ! -e _pub/state
          test ! -e _pub/data
          test ! -e _pub/.env

          cd _pub
          git init -b radar-output
          git config user.name "secpath-radar-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "radar output $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            radar-output

  deploy:
    name: Deploy GitHub Pages
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy validated site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  cleanup-state:
    name: Retain encrypted state rollback copies
    needs:
      - build
      - publish
      - deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write

    steps:
      - name: Keep the three newest encrypted state artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t stale_artifact_ids < <(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/artifacts?name=radar-private-state&per_page=100" \
              --jq '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | reverse | .[3:] | .[].id'
          )

          for artifact_id in "${stale_artifact_ids[@]}"; do
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}"
            echo "Deleted old encrypted state artifact ${artifact_id}"
          done
